name: Python application and Tests

on:
  push:
    branches: [ "master", "ai", "poetry", "pytest", "env_file_and_example" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        poetry install --no-root

    - name: Run tests
      env:
        PYTHONPATH: ./src
      run: |
        poetry run pytest
